<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#0f1418"/>
  <!-- Outer glow ring -->
  <circle cx="32" cy="32" r="30" stroke="#8ed5ff" stroke-width="1.5" stroke-opacity="0.3"/>
  
  <!-- Terminal prompt symbol: > _ -->
